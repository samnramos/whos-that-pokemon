<!DOCTYPE html>
<html>
    <head>
        <title>
            Pokemon Trivia
        </title>

        <style>
            body {
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;

                min-height: 100vh;
                margin: 0;

                font-family: Arial, sans-serf;
                text-align: center;
            }

            input {
                padding: 10px;
                width: 250px;
                margin: 10px;
            }

            button {
                padding: 10px 15px;
                cursor: pointer;
            }

            #hint
            #result,
            #hintsLeft {
                font-size: 18px;
                margin: 10px;
            }
        </style>
    </head>

    <body>
        <h1>
            Pokemon Trivia
        </h1>

        <p id = "hint">
            Start Game!
        </p>

        <p id = "hintsLeft">
            Hints Left: 0
        </p>

        <input id = "guessBox" type = "Text" placeholder = "Guess that Pokemon">

        <div class = "button-container">
        <button onclick = "submitGuess()"> 
            Guess
        </button>
        <button onclick = "getHint()"> 
            Get Hint
        </button>
        <button onclick = "startGame()">
            New Game
        </button>
        <button onclick = "giveUp()">
            Give Up
        </button>
        </div>

        <p id = "result">
        </p>

        <script>
            let gameId = null;
            async function startGame() {
                const response = await fetch("/new");
                const data = await response.json();

                console.log(data);

                gameId = data.gameId;

                document.getElementById("hint").textContent = "Hint: " + data.hint;
                document.getElementById("hintsLeft").textContent = "Hints Left: " + data.hintsLeft;
                document.getElementById("result").textContent = "";
                document.getElementById("guessBox").value = "";

            }

            async function submitGuess() {
                if (!gameId) {
                    alert("Start a game first!")
                    return;
                }

                const guess = document.getElementById("guessBox").value;
                const response = await fetch(`/guess/${gameId}/${guess}`)
                const data = await response.json();
                
                document.getElementById("result").textContent = data.message;
            }


                async function getHint() {
                    if (!gameId) {
                        alert("Start a game first!");
                        return;
                    }

                    const response = await fetch (`/hint/${gameId}`);
                    const data = await response.json();

                    if (data.hint) {
                        document.getElementById("hint").textContent = "Hint: " + data.hint;
                        document.getElementById("hintsLeft").textContent = "Hints Left: " + data.hintsLeft;
                    } else {
                        document.getElementById("hint").textContent = data.message;
                        document.getElementById("hintsLeft").textContent = "Hints Left: 0";
                    }

                    async function giveUp() {
                        const response = await fetch(`/giveup/${gameId}`);
                        const data = await response.json();

                        document.getElementById("result").textContent = data.message;
                        
                        gameId = null;
                    }
                }

                startGame();
        </script>
    </body>
</html>
