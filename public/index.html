<html>
    <head>
        <title>
            Pokemon Trivia
        </title>

        <style>
            body {
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;

                min-height: 100vh;
                margin: 0;

                font-family: Arial, sans-serif;
                text-align: center;

                background: White;
                color: Black;
                transition: all 0.5s ease;
            }

            .dark-mode {
                background: black;
                color: White;
            }

            .dark-mode input {
                background-color: #222; 
                color: White; 
                border: 1px solid white;
            }

            .dark-mode button {
                background-color: #333;
                color: White;
                border: 1px solid white;
            }

            input {
                padding: 10px;
                width: 250px;
                margin: 10px;
            }

            button {
                padding: 10px 15px;
                cursor: pointer;
            }

            .hint-panel {
                position: fixed;
                left: 20px;
                top: 50%;
                transform: translateY(-50%);

                display: flex;
                flex-direction: column;
                gap: 10px
            }

            #themeButton {
                position: fixed;
                top: 15px;
                right: 15px;

                padding: 10px 15px;
                border-radius: 8px;

                z-index: 1000;
            }

            #hint,
            #result,
            #hintsLeft {
                font-size: 18px;
                margin: 10px;
            }
        </style>
    </head>

    <body>
        <button id = "themeButton" 
        onclick = "toggleTheme()">
            Dark Mode
        </button>
        <h1>
            Pokemon Trivia
        </h1>

        <p id = "hint">
            Start Game!
        </p>

        <p id = "hintsLeft">
            Hints Left: 0
        </p>

        <input id = "guessBox" type = "Text" placeholder = "Guess that Pokemon">
        
        <div class = "hint-panel">
        <button onclick = "getHint('type')"> 
            Type Hint
        </button>
         <button onclick = "getHint('move')"> 
            Move Hint
        </button>
         <button onclick = "getHint('generation')"> 
            Generation Hint
        </button>
         <button onclick = "getHint('foundin')"> 
            Found In Hint
        </button>
         <button onclick = "getHint('weight')"> 
            Weight Hint
        </button>
        </div>

        <div class = "button-container">
        <button onclick = "submitGuess()"> 
            Guess
        </button>
        <button onclick = "startGame()">
            New Game
        </button>
        <button onclick = "giveUp()">
            Give Up
        </button>
        </div>

        <p id = "result">
        </p>

        <script>
            let gameId = null;
            async function startGame() {
                const response = await fetch("/new");
                const data = await response.json();

                console.log(data);

                gameId = data.gameId;

                document.getElementById("hint").textContent = "Hint: " + data.hint;
                document.getElementById("hintsLeft").textContent = `Hints Left: ${data.hintsLeft}`;
                document.getElementById("result").textContent = "";
                document.getElementById("guessBox").value = "";

            }

            async function submitGuess() {
                if (!gameId) {
                    alert("Start a game first!")
                    return;
                }

                const guess = document.getElementById("guessBox").value;
                const response = await fetch(`/guess/${gameId}/${guess}`)
                const data = await response.json();
                
                document.getElementById("result").textContent = data.message;
            }


                async function getHint(category) {
                    console.log("Category:", category);
                    console.log("Game ID:", gameId);

                    if (!gameId) {
                        alert("Start a game first!");
                        return;
                    }

                    const response = await fetch (`/hint/${gameId}/${category}`);
                    console.log("Response status:", response.status);

                    const data = await response.json();
                    console.log(data);

                    if (data.hint) {
                        document.getElementById("hint").textContent = `${category.toUpperCase()} Hints: ${data.hint}`;                        
                        document.getElementById("hintsLeft").textContent = `Hints Left: ${data.hintsLeft}`;
                    } else {
                        document.getElementById("hint").textContent = data.message;
                        document.getElementById("hintsLeft").textContent = "Hints Left: 0";
                    }
                }

                async function giveUp() {
                        const response = await fetch(`/giveup/${gameId}`);
                        const data = await response.json();

                        document.getElementById("result").textContent = data.message;
                        
                        gameId = null;
                }

                function toggleTheme() {
                    document.body.classList.toggle("dark-mode");

                    console.log(document.body.className);

                    const button = document.getElementById("themeButton");

                    if (document.body.classList.contains("dark-mode")) {
                        button.textContent = "Light Mode";
                    } else {
                        button.textContent = "Dark Mode";
                    }
                }

                startGame();
        </script>
    </body>
</html>
