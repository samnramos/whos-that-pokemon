app.get("/", (req, res) => {
    res.send(`
    <html>
    <head>
        <title>Pokemon Trivia</title>

        <style>
        body {
            text-align: center;
            background: linear-gradient(
                to bottom,
                #ff0000 50%,
                #ffffff 50%
                );
                font-family: "Times New Roman", serif;
                color: #000000;
                margin-top: 100px;
        }

            h1 {
                font-size: 80px;
            }

            button {
                font-size: 24px;
                padding: 15px 40px; 
                background-color: #ffdd00; 
                color: #003cff; 
                border: none;
                border-radius: 10px;
                cursor: pointer;
            }

            button:hover {
                background-color: #ffd000; 
            }
        </style>
    </head>

    <body>
        <h1>Who's that Pokémon?</h1>

        <button onclick="startGame()">
            Play
        </button>

        <p id="hint"></p>

        <script>
            let gameId = null;

            function startGame() {
                fetch("/new")
                .then(res => res.json())
                .then(data => {
                    gameId = data.gameId;
                    document.getElementById("hint").innerText = data.hint;
                });
            }
        </script>
    </body>
    </html>
    `);
});
