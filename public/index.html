<html>
    <head>
        <title>
            Pokemon Trivia
        </title>

        <style>
            body {
                display: flex;
                min-height: 100vh;
                margin: 0;

                font-family: Arial, sans-serif;
                background: White;
                color: Black;
            }

            .sidebar {
                width: 450px;
                padding: 20px;

                display: flex;
                flex-direction: column;
                gap: 20px;

                border-right: 2px solid black;
            }

            .dark-mode .sidebar {
                border-right: 2px solid white;
            }

            .dark-mode {
                background: black;
                color: White;
            }

            .dark-mode input {
                background-color: #222; 
                color: White; 
                border: 1px solid white;
            }

            .dark-mode button {
                background-color: #333;
                color: White;
                border: 1px solid white;
            }

            input {
                padding: 10px;
                width: 250px;
                margin: 10px;
            }

            button {
                padding: 10px 15px;
                cursor: pointer;
            }

            .scoreboard {
                border: 2px solid black;
                border-radius: 10px;
                padding: 15px;
                text-align: left;
            }

            .dark-mode .scoreboard {
                background: black;
                color: white;
                border-color: white;
            }

            .hint-panel {
                grid-template-columns: 1fr 1fr;
                gap: 10px;
                justify-items: center;
            }

            .hint-panel h3 {
                grid-column: 1 / -1;
                text-align: center;
            }

            .hint-panel button {
                width: 140px;
            }

            .weight-btn {
                grid-column: 1 / -1;
                justify-self: center;
            }

            .game-area {
                flex: 1;

                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
            }

            #themeButton {
                position: fixed;
                top: 15px;
                right: 15px;

                padding: 10px 15px;
                border-radius: 8px;

                z-index: 1000;
            }

            #hint,
            #result,
            #hintsLeft {
                font-size: 18px;
                margin: 10px;
            }
        </style>
    </head>

    <body>
        <button id = "themeButton" 
        onclick = "toggleTheme()">
            Dark Mode
        </button>

        <div class = "sidebar">
        <div class = "scoreboard">
            <h3>
                Scoreboard
            </h3>
            <p> 
                Wins:
                 <span id = "Wins"> 
                    0 
                </span> 
            </p>
            <p>
                Losses: 
                <span id = "Losses"> 
                    0 
            </span>
        </p>
        <p> 
            Games Played:
             <span id = "gamesPlayed"> 
                0 
            </span>
        </p>
        <p> 
            Current Score: 
            <span id = "Score"> 
                0 
            </span>
        </p>
        <p> 
            Total Points: 
            <span id = "totalScore"> 
                0 
            </span>
        </p>
        </div>

         <div class = "hint-panel">
            <h3> Hints </h3>
        <button onclick = "getHint('type')"> 
            Type Hint
        </button>
         <button onclick = "getHint('move')"> 
            Move Hint
        </button>
         <button onclick = "getHint('generation')"> 
            Generation Hint
        </button>
         <button onclick = "getHint('foundin')"> 
            Found In Hint
        </button>
         <button onclick = "getHint('weight')"> 
            Weight Hint
        </button>
        </div>
        </div>
        <div class = "game-area">
        <h1>
            Pokemon Trivia
        </h1>

        <p id = "hint">
            Start Game!
        </p>

        <p id = "hintsLeft">
            Hints Left: 0
        </p>

        <input id = "guessBox" type = "Text" placeholder = "Guess that Pokemon">

        <div class = "button-container">
        <button onclick = "submitGuess()"> 
            Guess
        </button>
        <button onclick = "startGame()">
            New Game
        </button>
        <button onclick = "giveUp()">
            Give Up
        </button>
        </div>

        <p id = "result">
        </p>
        </div>
        <script>
            let gameId = null;

            let Wins = 0;
            let Losses = 0;
            let score = 0;
            let totalScore = 0;

            async function startGame() {
                const response = await fetch("/new");
                const data = await response.json();

                console.log(data);

                gameId = data.gameId;

                document.getElementById("hint").textContent = "Hint: " + data.hint;
                document.getElementById("hintsLeft").textContent = `Hints Left: ${data.hintsLeft}`;
                document.getElementById("result").textContent = "";
                document.getElementById("guessBox").value = "";

            }

            async function submitGuess() {
                if (!gameId) {
                    alert("Start a game first!")
                    return;
                }

                const guess = document.getElementById("guessBox").value;
                const response = await fetch(`/guess/${gameId}/${guess}`)
                const data = await response.json();
                
                document.getElementById("result").textContent = data.message;

                if (data.result === "correct") {
                    Wins++;
                    score = data.score;
                    totalScore += data.score;

                    updateScoreboard();
                    gameId = null;
                }

                if (data.message.toLowerCase().includes("correct")) {
                    
                    Wins ++;
                    updateScoreboard();
                    totalScore += data.score;
                    
                    gameId = null;
                }
            }


                async function getHint(category) {
                    console.log("Category:", category);
                    console.log("Game ID:", gameId);

                    if (!gameId) {
                        alert("Start a game first!");
                        return;
                    }

                    const response = await fetch (`/hint/${gameId}/${category}`);
                    console.log("Response status:", response.status);

                    const data = await response.json();
                    console.log(data);

                    if (data.hint) {
                        document.getElementById("hint").textContent = `${category.toUpperCase()} Hints: ${data.hint}`;                        
                        document.getElementById("hintsLeft").textContent = `Hints Left: ${data.hintsLeft}`;
                    } else {
                        document.getElementById("hint").textContent = data.message;
                        document.getElementById("hintsLeft").textContent = "Hints Left: 0";
                    }
                }

                async function giveUp() {
                        const response = await fetch(`/giveup/${gameId}`);
                        const data = await response.json();

                        document.getElementById("result").textContent = data.message;

                        Losses++;
                        Score = 0;

                        updateScoreboard();
                        
                        gameId = null;
                }

                function toggleTheme() {
                    document.body.classList.toggle("dark-mode");

                    console.log(document.body.className);

                    const button = document.getElementById("themeButton");

                    if (document.body.classList.contains("dark-mode")) {
                        button.textContent = "Light Mode";
                    } else {
                        button.textContent = "Dark Mode";
                    }
                }

                function updateScoreboard() {
                    document.getElementById("Wins").textContent = Wins;
                    document.getElementById("Losses").textContent = Losses;
                    document.getElementById("gamesPlayed").textContent = Wins + Losses;
                    document.getElementById("Score").textContent = score;
                    document.getElementById("totalScore").textContent = totslScore;
                }

                startGame();
        </script>
    </body>
</html>
